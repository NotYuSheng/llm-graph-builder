name: Build and Push Docker Images to GHCR

on:
  push:
    branches:
      - main  # Trigger the workflow on push to the main branch
  pull_request:
    branches:
      - main  # Trigger the workflow on pull requests to the main branch

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set the lowercase image tag for the backend and frontend
      - name: Set Image Tags to Lowercase
        run: |
          BACKEND_TAG="ghcr.io/${{ github.repository_owner }}/backend:latest"
          FRONTEND_TAG="ghcr.io/${{ github.repository_owner }}/frontend:latest"
          BACKEND_TAG_LOWERCASE=$(echo $BACKEND_TAG | tr '[:upper:]' '[:lower:]')
          FRONTEND_TAG_LOWERCASE=$(echo $FRONTEND_TAG | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_TAG=$BACKEND_TAG_LOWERCASE" >> $GITHUB_ENV
          echo "FRONTEND_TAG=$FRONTEND_TAG_LOWERCASE" >> $GITHUB_ENV

      # Build and push backend Docker image
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_TAG }}

      # Build and push frontend Docker image
      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_TAG }}
